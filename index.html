<!DOCTYPE html>
<html>
<head>
  <title>Pixel Desktop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="desktop">

  <!-- ICON -->
  <div class="icon" ondblclick="openWindow('about')">
    <div class="icon-box">🧍</div>
    <p>About Me</p>
  </div>

  <!-- WINDOW -->
  <div id="about" class="window hidden">
    <div class="title-bar">
      About Me.exe
      <button onclick="closeWindow('about')">X</button>
    </div>
    <div class="content">
      <p>Hello! I'm Kelly.</p>
      <p>This is my pixel desktop site.</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
